version: '3.8'

services:
  backend:
    build: ./backend
    container_name: optic-backend
    ports:
      - "8082:8082"
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: ./frontend
    container_name: optic-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always
