services:
  backend:
    build: ./backend
    container_name: optic-backend
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "8082:8082"
    env_file:
      - ./backend/.env
    # QUAN TRỌNG: Chạy bằng nodemon để tự restart khi sửa code
    command: npm run dev
    restart: always

  frontend:
    build: ./frontend
    container_name: optic-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always
